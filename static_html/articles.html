<!DOCTYPE html>
<html lang="en" data-theme="" data-hero="split" data-grid="1">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Articles - Expertly</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;450;500;600;700&family=Archivo:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="assets/theme.css">
  <link rel="stylesheet" href="assets/home.css">
  <link rel="stylesheet" href="assets/pages.css">
  <style>
    /* ═══════════════════════════════════════════════
   Articles Page
   • Hero + AI Search
   • Dark banner
   • V3 bento grid — filterable by category
   ═══════════════════════════════════════════════ */

    /* ── Hero ─────────────────────────────────────── */
    .anv-hero {
      background: var(--bg-alt);
      padding: 56px 0 48px;
      border-bottom: 1px solid var(--line);
    }

    .anv-hero-heading {
      font-size: clamp(30px, 3.8vw, 50px);
      font-weight: 500;
      letter-spacing: -0.03em;
      line-height: 1.04;
      color: var(--ink);
      margin-top: 18px;
    }

    .anv-hero-heading em {
      font-style: normal;
      font-weight: 400;
      color: var(--accent);
    }

    .anv-hero-sub {
      font-size: 16px;
      color: var(--ink-3);
      margin-top: 14px;
      max-width: 580px;
      line-height: 1.55;
    }

    /* ── Dark banner (original "zero section") ───── */
    .anv-spotlight-wrap {
      padding: 48px 0;
    }

    .anv-banner {
      background: var(--ink);
      border-radius: 22px;
      padding: 52px 60px;
      position: relative;
      overflow: hidden;
    }

    .anv-banner::before {
      content: '';
      position: absolute;
      top: -60px;
      left: -60px;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, color-mix(in oklab, var(--accent) 22%, transparent) 0%, transparent 65%);
      pointer-events: none;
    }

    .anv-banner-eyebrow {
      font-family: 'Archivo', sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--neon);
      margin-bottom: 18px;
      display: block;
      position: relative;
      z-index: 1;
    }

    .anv-banner-text {
      font-family: 'Geist', ui-sans-serif, system-ui, sans-serif;
      font-feature-settings: 'ss01', 'cv11';
      font-size: clamp(26px, 3.2vw, 44px);
      font-weight: 500;
      letter-spacing: -0.03em;
      line-height: 1.08;
      color: #fff;
      position: relative;
      z-index: 1;
      max-width: 800px;
    }

    /* ── Section headers ──────────────────────────── */
    .anv-section-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 24px;
      padding-bottom: 28px;
      flex-wrap: wrap;
    }

    .anv-section-head-left {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .anv-section-label {
      font-family: 'Archivo', sans-serif;
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: capitalize;
      color: var(--ink-3);
      font-weight: 500;
      display: inline-flex;
      align-items: center;
      gap: 9px;
    }

    .anv-section-label::before {
      content: '';
      width: 22px;
      height: 2px;
      background: var(--accent);
      border-radius: 2px;
    }

    .anv-section-title {
      font-size: clamp(22px, 2.4vw, 32px);
      font-weight: 500;
      letter-spacing: -0.02em;
      color: var(--ink);
      line-height: 1.1;
    }

    /* ── Filter dropdowns (button + searchable popover) ──
       Neutral styling to match the Members page filters. ── */
    .anv-section-head-right {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .anv-filter-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 13px;
      border-radius: 100px;
      background: var(--bg-card);
      border: 1px solid var(--line-2);
      font-family: inherit;
      font-size: 12.5px;
      font-weight: 500;
      color: var(--ink);
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s, color 0.15s;
      white-space: nowrap;
      position: relative;
      user-select: none;
    }

    .anv-filter-btn-icon {
      color: var(--ink-3);
      flex-shrink: 0;
      display: inline-flex;
    }

    .anv-filter-btn:hover {
      border-color: var(--ink-3);
    }

    .anv-filter-btn.open {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px color-mix(in oklab, var(--accent) 14%, transparent);
    }

    .anv-filter-btn.has-value {
      background: var(--ink);
      color: #fff;
      border-color: var(--ink);
    }

    .anv-filter-btn.has-value .anv-filter-btn-icon { color: #fff; }

    .anv-filter-btn-caret {
      font-size: 9px;
      opacity: 0.5;
      transition: transform 0.2s;
    }

    .anv-filter-btn.open .anv-filter-btn-caret { transform: rotate(180deg); }

    .anv-filter-clear {
      display: none;
      align-items: center;
      justify-content: center;
      width: 15px;
      height: 15px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.2);
      font-size: 9px;
      line-height: 1;
    }

    .anv-filter-btn.has-value .anv-filter-clear { display: inline-flex; }

    .anv-popover {
      position: absolute;
      top: calc(100% + 8px);
      left: 0;
      z-index: 40;
      width: 250px;
      max-width: 82vw;
      background: var(--bg-card);
      border: 1px solid var(--line-2);
      border-radius: 14px;
      box-shadow: 0 16px 48px -8px rgba(0, 0, 0, 0.14), 0 4px 12px -4px rgba(0, 0, 0, 0.08);
      opacity: 0;
      pointer-events: none;
      transform: translateY(-6px) scale(0.98);
      transform-origin: top left;
      transition: opacity 0.18s, transform 0.18s;
      padding: 10px 0 8px;
    }

    .anv-popover.open {
      opacity: 1;
      pointer-events: all;
      transform: none;
    }

    .anv-dd-search-wrap { padding: 0 10px 8px; }

    .anv-dd-search {
      width: 100%;
      box-sizing: border-box;
      padding: 7px 12px;
      border: 1px solid var(--line-2);
      border-radius: 8px;
      font-family: 'Geist', sans-serif;
      font-size: 13px;
      font-weight: 400;
      color: var(--ink);
      background: var(--bg-alt);
      outline: none;
      transition: border-color 0.15s;
    }

    .anv-dd-search:focus { border-color: var(--accent); }

    .anv-dd-list {
      max-height: 240px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--line-2) transparent;
    }

    .anv-dd-option {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 8px 14px;
      font-family: 'Geist', sans-serif;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: normal;
      text-transform: none;
      color: var(--ink-2);
      cursor: pointer;
      transition: background 0.1s, color 0.1s;
    }

    .anv-dd-option:hover { background: var(--bg-alt); color: var(--ink); }

    .anv-dd-option.selected { color: var(--accent); font-weight: 600; }

    .anv-dd-check {
      font-size: 11px;
      color: var(--accent);
      opacity: 0;
    }

    .anv-dd-option.selected .anv-dd-check { opacity: 1; }

    .anv-dd-empty {
      padding: 18px 14px;
      font-size: 13px;
      color: var(--ink-4);
      text-align: center;
    }

    /* ── V3 Bento grid ────────────────────────────── */
    .anv-grid-wrap {
      padding: 0 0 100px;
    }

    .anv-grid-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--line);
      margin-bottom: 20px;
    }

    .anv-grid-count {
      font-family: 'Archivo', sans-serif;
      font-size: 11px;
      letter-spacing: 0.1em;
      color: var(--ink-4);
    }

    .anv-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }

    /* ── V3 card - image top, title + author photo side-by-side ─── */
    .anv-card {
      background: #fff;
      border: 1.5px solid rgba(0, 0, 0, 0.14);
      border-radius: 20px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      text-decoration: none;
      color: inherit;
      transition: transform 0.28s cubic-bezier(0.22, 1, 0.36, 1), box-shadow 0.28s, border-color 0.2s;
    }

    .anv-card:hover {
      transform: translateY(-5px);
      border-color: var(--accent);
      box-shadow: 0 16px 48px -12px color-mix(in oklab, var(--accent) 18%, rgba(0, 0, 0, 0.08));
    }

    /* Top image — 70% of card height */
    .anv-card-img {
      width: 100%;
      height: 190px;
      overflow: hidden;
      flex-shrink: 0;
    }

    .anv-card-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
      transition: transform 0.4s ease;
    }

    .anv-card:hover .anv-card-img img {
      transform: scale(1.04);
    }

    /* Body — compact 30% */
    .anv-card-body {
      flex: 1;
      padding: 12px 14px 14px;
      display: flex;
      flex-direction: column;
    }

    /* Category + date row */
    .anv-card-top-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 6px;
    }

    .anv-cat-label {
      font-family: 'Archivo', sans-serif;
      font-size: 10.5px;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--accent);
    }

    /* Article title — consistent with site type scale */
    .anv-card-title {
      font-family: 'Geist', ui-sans-serif, system-ui, -apple-system, sans-serif;
      font-feature-settings: 'ss01', 'cv11';
      font-size: 15px;
      font-weight: 500;
      letter-spacing: -0.015em;
      line-height: 1.3;
      color: var(--ink);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      flex: 1;
    }

    /* Author row — compact, no separator */
    .anv-card-author-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
    }

    .anv-card-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      overflow: hidden;
      flex-shrink: 0;
      background: color-mix(in oklab, var(--accent) 18%, white);
    }

    .anv-card-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      display: block;
    }

    .anv-card-avatar-init {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--accent);
      font-size: 10px;
      font-weight: 700;
    }

    .anv-card-author-info {
      display: flex;
      flex-direction: column;
      gap: 1px;
      min-width: 0;
    }

    .anv-card-author-name {
      font-size: 12px;
      font-weight: 500;
      color: var(--ink-2);
      line-height: 1.3;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .anv-card-designation {
      font-family: 'Archivo', sans-serif;
      font-size: 10px;
      color: var(--ink-4);
      letter-spacing: 0.02em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .anv-card-meta {
      font-family: 'Archivo', sans-serif;
      font-size: 10.5px;
      color: var(--ink-3);
      letter-spacing: 0.04em;
      white-space: nowrap;
    }

    /* Empty state */
    .anv-empty {
      padding: 64px 0;
      text-align: center;
    }

    .anv-empty h3 {
      font-size: 22px;
      font-weight: 500;
      letter-spacing: -0.02em;
      margin: 10px 0 20px;
    }

    /* ── Responsive ───────────────────────────────── */
    @media (max-width: 1000px) {
      .anv-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 680px) {
      .anv-grid {
        grid-template-columns: 1fr;
      }
      .anv-banner { padding: 36px 28px; }
      .anv-spotlight-wrap { padding: 28px 0; }
    }

    @media (max-width: 400px) {
      .anv-card-img { height: 160px; }
    }

    @keyframes anvIn {
      from {
        opacity: 0;
        transform: translateY(12px);
      }

      to {
        opacity: 1;
        transform: none;
      }
    }
  </style>
</head>

<body>
<a href="#main-content" class="skip-link">Skip to main content</a>
<div class="page-body">

  <!-- Navigation -->
  <nav class="nav" role="navigation" aria-label="Main navigation"></nav>

  <main id="main-content">

    <!-- ── Hero ── -->
    <section class="anv-hero">
      <div class="container-wide">
        <span class="eyebrow" style="display:inline-flex;align-items:center;gap:9px;">
          <span style="width:22px;height:2px;background:var(--accent);border-radius:2px;display:inline-block;"></span>
          Knowledge base
        </span>
        <h1 class="anv-hero-heading">
          Insights from the people who actually <em>practice.</em>
        </h1>
        <p class="anv-hero-sub">
          Peer-reviewed analysis and expert commentary from verified finance & legal professionals.
        </p>

        <div class="hero-search" style="margin-top:36px; max-width:680px;">
          <div class="hero-search-input">

              <span class="ai-pulse small"></span>
            </div>

    <div class="anv-spotlight-wrap">

    </div>

    <!-- ── Browsable V3 bento grid ── -->
    <section class="anv-grid-wrap">
      <div class="container-wide">
        <div class="anv-section-head">
          <div class="anv-section-head-left">
            <span class="anv-section-label">Browse</span>
            <h2 class="anv-section-title">All articles</h2>
          </div>
          <div class="anv-section-head-right">
            <div style="position:relative;" id="anv-country-wrapper">
              <button class="anv-filter-btn" id="anv-country-trigger" type="button">
                <span id="anv-country-label">All countries</span>
                <span class="anv-filter-btn-caret">▾</span>
                <span class="anv-filter-clear" id="anv-country-clear">✕</span>
              </button>
              <div class="anv-popover" id="anv-country-popover">
                <div class="anv-dd-search-wrap">
                  <input class="anv-dd-search" id="anv-country-search" placeholder="Search countries…" autocomplete="off">
                </div>
                <div class="anv-dd-list" id="anv-country-list"></div>
              </div>
            </div>
            <div style="position:relative;" id="anv-cat-wrapper">
              <button class="anv-filter-btn" id="anv-cat-trigger" type="button">
                <svg class="anv-filter-btn-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 5h16M7 12h10M10 19h4"/></svg>
                <span id="anv-cat-label">All categories</span>
                <span class="anv-filter-btn-caret">▾</span>
              </button>
              <div class="anv-popover" id="anv-cat-popover">
                <div class="anv-dd-search-wrap">
                  <input class="anv-dd-search" id="anv-cat-search" placeholder="Search categories…" autocomplete="off">
                </div>
                <div class="anv-dd-list" id="anv-cat-list"></div>
              </div>
            </div>
          </div>
        </div>
        <div class="anv-grid-head">
          <span class="anv-grid-count mono" id="anv-count"></span>
        </div>
        <div id="anv-empty" class="anv-empty" style="display:none;">
          <div class="mono" style="color:var(--ink-4);font-size:11px;letter-spacing:.12em;">No results</div>
          <h3>No articles in this category yet.</h3>
          <button class="btn btn-outline" id="anv-reset">View all</button>
        </div>
        <div class="anv-grid" id="anv-grid"></div>
      </div>
    </section>

  </main>

</div><!-- /.page-body -->

<footer class="footer--minimal" aria-label="Site footer"></footer>

  <script src="assets/members.js"></script>
  <script src="assets/shared.js"></script>
  <script>
    (function () {
      const phrases = [
        'Transfer pricing insights for 2026',
        'UAE corporate tax guidelines explained',
        'M&A due diligence cross-border trends',
        'IP rights in the era of AI training data'
      ];
      let idx = 0;
      document.addEventListener('DOMContentLoaded', () => {
        const heroSearch = document.querySelector('.hero-search');
        const typebox = document.querySelector('.hero-typebox');
        if (typebox) {
          setInterval(() => {
            idx = (idx + 1) % phrases.length;
            typebox.innerHTML = `<span class="hero-phrase" style="animation:heroPhraseIn 0.45s cubic-bezier(0.22,1,0.36,1);">${phrases[idx]}</span>`;
          }, 3200);
        }
        if (heroSearch) {
          heroSearch.addEventListener('click', () => {
            const q = heroSearch.querySelector('.hero-phrase')?.textContent || '';
            window.dispatchEvent(new CustomEvent('expertly:search', { detail: { q } }));
          });
        }
      });
    })();
  </script>

  <!-- ── Articles page logic ── -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const articles = window.EXPERTLY_ARTICLES || [];
      const members = window.EXPERTLY_MEMBERS || [];

      const spotlightEl = document.getElementById('anv-spotlight');
      const gridEl = document.getElementById('anv-grid');
      const countEl = document.getElementById('anv-count');
      const emptyEl = document.getElementById('anv-empty');
      const resetBtn = document.getElementById('anv-reset');

      let activeCat = 'All';
      let activeCountry = 'All';

      const getAuthor = id => members.find(m => m.id === id)
        || { name: 'Expertly Counsel', initials: 'EC', img: '', title: 'Advisor', location: '' };

      /* ── Dark banner ── */
      const renderSpotlight = () => {
        if (!spotlightEl) return;
        spotlightEl.innerHTML = `
      <div class="anv-banner">
        <span class="anv-banner-eyebrow">Our editorial standard</span>
        <p class="anv-banner-text">Written by practitioners,<br>reviewed by peers.</p>
      </div>`;
      };

      /* ── Category dropdown (button + searchable popover) ── */
      const cats = ['All', ...new Set(articles.map(a => a.category))];

      const catTrigger = document.getElementById('anv-cat-trigger');
      const catPopover = document.getElementById('anv-cat-popover');
      const catLabel = document.getElementById('anv-cat-label');
      const catSearch = document.getElementById('anv-cat-search');
      const catList = document.getElementById('anv-cat-list');
      const catWrapper = document.getElementById('anv-cat-wrapper');
      let catOpen = false;

      const buildCatList = (query = '') => {
        const q = query.trim().toLowerCase();
        const filtered = q ? cats.filter(c => c.toLowerCase().includes(q)) : cats;
        catList.innerHTML = filtered.length
          ? filtered.map(c => `
            <div class="anv-dd-option${c === activeCat ? ' selected' : ''}" data-cat="${c}">
              <span>${c}</span>
              <span class="anv-dd-check">✓</span>
            </div>`).join('')
          : `<div class="anv-dd-empty">No matches</div>`;

        catList.querySelectorAll('.anv-dd-option').forEach(el => {
          el.addEventListener('click', () => {
            activeCat = el.dataset.cat;
            catLabel.textContent = activeCat === 'All' ? 'All categories' : activeCat;
            catTrigger.classList.toggle('has-value', activeCat !== 'All');
            closeCatDd();
            renderGrid();
          });
        });
      };

      const closeCatDd = () => {
        catOpen = false;
        catTrigger.classList.remove('open');
        catPopover.classList.remove('open');
      };

      const openCatDd = () => {
        catOpen = true;
        catTrigger.classList.add('open');
        catPopover.classList.add('open');
        catSearch.value = '';
        buildCatList();
        setTimeout(() => catSearch.focus(), 50);
      };

      catTrigger.addEventListener('click', e => {
        e.stopPropagation();
        catOpen ? closeCatDd() : openCatDd();
      });
      catSearch.addEventListener('input', () => buildCatList(catSearch.value));
      catWrapper.addEventListener('click', e => e.stopPropagation());
      document.addEventListener('click', () => { if (catOpen) closeCatDd(); });

      buildCatList();

      resetBtn.addEventListener('click', () => {
        activeCat = 'All';
        catLabel.textContent = 'All categories';
        catTrigger.classList.remove('has-value');
        buildCatList();
        activeCountry = 'All';
        countryLabel.textContent = 'All countries';
        countryTrigger.classList.remove('has-value');
        buildCountryList();
        renderGrid();
      });

      /* ── 3b. Country dropdown (button + searchable popover) ── */
      const getCountry = a => {
        const au = getAuthor(a.author);
        return au.location ? au.location.split(', ').slice(-1)[0] : '';
      };

      /* Full list of the world's 195 countries, shown in the filter so
         people can browse/search beyond wherever current authors happen
         to be based — same list used on the Members page. */
      const ALL_COUNTRIES = [
        'Afghanistan', 'Albania', 'Algeria', 'Andorra', 'Angola', 'Antigua and Barbuda', 'Argentina',
        'Armenia', 'Australia', 'Austria', 'Azerbaijan', 'Bahamas', 'Bahrain', 'Bangladesh', 'Barbados',
        'Belarus', 'Belgium', 'Belize', 'Benin', 'Bhutan', 'Bolivia', 'Bosnia and Herzegovina', 'Botswana',
        'Brazil', 'Brunei', 'Bulgaria', 'Burkina Faso', 'Burundi', 'Cabo Verde', 'Cambodia', 'Cameroon',
        'Canada', 'Central African Republic', 'Chad', 'Chile', 'China', 'Colombia', 'Comoros',
        'Congo, Democratic Republic of the', 'Congo, Republic of the', 'Costa Rica', 'Croatia', 'Cuba',
        'Cyprus', 'Czechia', 'Denmark', 'Djibouti', 'Dominica', 'Dominican Republic', 'Ecuador', 'Egypt',
        'El Salvador', 'Equatorial Guinea', 'Eritrea', 'Estonia', 'Eswatini', 'Ethiopia', 'Fiji', 'Finland',
        'France', 'Gabon', 'Gambia', 'Georgia', 'Germany', 'Ghana', 'Greece', 'Grenada', 'Guatemala',
        'Guinea', 'Guinea-Bissau', 'Guyana', 'Haiti', 'Honduras', 'Hungary', 'Iceland', 'India', 'Indonesia',
        'Iran', 'Iraq', 'Ireland', 'Israel', 'Italy', 'Ivory Coast', 'Jamaica', 'Japan', 'Jordan',
        'Kazakhstan', 'Kenya', 'Kiribati', 'Kuwait', 'Kyrgyzstan', 'Laos', 'Latvia', 'Lebanon',
        'Lesotho', 'Liberia', 'Libya', 'Liechtenstein', 'Lithuania', 'Luxembourg', 'Madagascar', 'Malawi',
        'Malaysia', 'Maldives', 'Mali', 'Malta', 'Marshall Islands', 'Mauritania', 'Mauritius', 'Mexico',
        'Micronesia', 'Moldova', 'Monaco', 'Mongolia', 'Montenegro', 'Morocco', 'Mozambique', 'Myanmar',
        'Namibia', 'Nauru', 'Nepal', 'Netherlands', 'New Zealand', 'Nicaragua', 'Niger', 'Nigeria',
        'North Korea', 'North Macedonia', 'Norway', 'Oman', 'Pakistan', 'Palau', 'Palestine', 'Panama',
        'Papua New Guinea', 'Paraguay', 'Peru', 'Philippines', 'Poland', 'Portugal', 'Qatar', 'Romania',
        'Russia', 'Rwanda', 'Saint Kitts and Nevis', 'Saint Lucia', 'Saint Vincent and the Grenadines',
        'Samoa', 'San Marino', 'Sao Tome and Principe', 'Saudi Arabia', 'Senegal', 'Serbia', 'Seychelles',
        'Sierra Leone', 'Singapore', 'Slovakia', 'Slovenia', 'Solomon Islands', 'Somalia', 'South Africa',
        'South Korea', 'South Sudan', 'Spain', 'Sri Lanka', 'Sudan', 'Suriname', 'Sweden', 'Switzerland',
        'Syria', 'Tajikistan', 'Tanzania', 'Thailand', 'Timor-Leste', 'Togo', 'Tonga',
        'Trinidad and Tobago', 'Tunisia', 'Turkey', 'Turkmenistan', 'Tuvalu', 'Uganda', 'Ukraine',
        'United Arab Emirates', 'United Kingdom', 'United States', 'Uruguay', 'Uzbekistan', 'Vanuatu',
        'Vatican City', 'Venezuela', 'Vietnam', 'Yemen', 'Zambia', 'Zimbabwe'
      ];
      const countries = ['All', ...ALL_COUNTRIES];

      const countryTrigger = document.getElementById('anv-country-trigger');
      const countryPopover = document.getElementById('anv-country-popover');
      const countryLabel = document.getElementById('anv-country-label');
      const countrySearch = document.getElementById('anv-country-search');
      const countryList = document.getElementById('anv-country-list');
      const countryWrapper = document.getElementById('anv-country-wrapper');
      const countryClear = document.getElementById('anv-country-clear');
      let countryOpen = false;

      const buildCountryList = (query = '') => {
        const q = query.trim().toLowerCase();
        const filtered = q ? countries.filter(c => c.toLowerCase().includes(q)) : countries;
        countryList.innerHTML = filtered.length
          ? filtered.map(c => `
            <div class="anv-dd-option${c === activeCountry ? ' selected' : ''}" data-country="${c}">
              <span>${c === 'All' ? 'All countries' : c}</span>
              <span class="anv-dd-check">✓</span>
            </div>`).join('')
          : `<div class="anv-dd-empty">No matches</div>`;

        countryList.querySelectorAll('.anv-dd-option').forEach(el => {
          el.addEventListener('click', () => {
            activeCountry = el.dataset.country;
            countryLabel.textContent = activeCountry === 'All' ? 'All countries' : activeCountry;
            countryTrigger.classList.toggle('has-value', activeCountry !== 'All');
            closeCountryDd();
            renderGrid();
          });
        });
      };

      const closeCountryDd = () => {
        countryOpen = false;
        countryTrigger.classList.remove('open');
        countryPopover.classList.remove('open');
      };

      const openCountryDd = () => {
        countryOpen = true;
        countryTrigger.classList.add('open');
        countryPopover.classList.add('open');
        countrySearch.value = '';
        buildCountryList();
        setTimeout(() => countrySearch.focus(), 50);
      };

      countryTrigger.addEventListener('click', e => {
        e.stopPropagation();
        countryOpen ? closeCountryDd() : openCountryDd();
      });
      countrySearch.addEventListener('input', () => buildCountryList(countrySearch.value));
      countryWrapper.addEventListener('click', e => e.stopPropagation());
      document.addEventListener('click', () => { if (countryOpen) closeCountryDd(); });
      countryClear.addEventListener('click', e => {
        e.stopPropagation();
        activeCountry = 'All';
        countryLabel.textContent = 'All countries';
        countryTrigger.classList.remove('has-value');
        buildCountryList();
        renderGrid();
      });

      buildCountryList();

      /* ── V3 bento grid (filtered) ── */
      const renderGrid = () => {
        let pool = activeCat === 'All'
          ? articles
          : articles.filter(a => a.category === activeCat);

        if (activeCountry !== 'All') {
          pool = pool.filter(a => getCountry(a) === activeCountry);
        }

        countEl.textContent = `${pool.length} article${pool.length !== 1 ? 's' : ''}`;

        if (!pool.length) {
          gridEl.innerHTML = '';
          emptyEl.style.display = 'block';
          return;
        }
        emptyEl.style.display = 'none';

        gridEl.innerHTML = pool.map((a, i) => {
          const au = getAuthor(a.author);
          const country = au.location ? au.location.split(', ').slice(-1)[0] : '';
          const delay = Math.min(i * 45, 360);

          const avatar = au.img
            ? `<div class="anv-card-avatar"><img src="${au.img}" alt="${au.name}" /></div>`
            : `<div class="anv-card-avatar"><div class="anv-card-avatar-init">${au.initials}</div></div>`;

          const designation = [au.title, au.firm].filter(Boolean).join(', ');

          return `
        <a class="anv-card" href="#${a.id}" id="${a.id}"
           style="animation:anvIn 0.45s cubic-bezier(0.22,1,0.36,1) ${delay}ms both;">
          <div class="anv-card-img">
            <img src="${a.image}" alt="${a.title}" loading="lazy" />
          </div>
          <div class="anv-card-body">
            <div class="anv-card-top-row">
              <span class="anv-cat-label">${a.category}${country ? `, ${country}` : ''}</span>
              <span class="anv-card-meta">${a.date} · ${a.readTime}</span>
            </div>
            <h3 class="anv-card-title">${a.title}</h3>
            <div class="anv-card-author-row">
              ${avatar}
              <div class="anv-card-author-info">
                <span class="anv-card-author-name">${au.name}</span>
                <span class="anv-card-designation">${designation}</span>
              </div>
            </div>
          </div>
        </a>`;
        }).join('');
      };

      /* ── Boot ── */
      renderSpotlight();
      renderGrid();
    });
  </script>
