<!DOCTYPE html>
<html lang="en" data-theme="">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Articles — Expertly</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;450;500;600;700&family=Archivo:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="../assets/theme.css">
  <link rel="stylesheet" href="../assets/dashboard-shell.css">
  <style>
    .pa-toolbar { display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; margin-bottom: 16px; }
    .pa-tabs { display: flex; gap: 4px; border-bottom: 1px solid var(--line); }
    .pa-tab {
      padding: 10px 4px; margin-right: 22px; font-size: 14px; font-weight: 450; color: var(--ink-3);
      border-bottom: 2px solid transparent; background: none;
    }
    .pa-tab.active { color: var(--ink); border-bottom-color: var(--accent); font-weight: 500; }
    .pa-panel { display: none; }
    .pa-panel.active { display: block; }

    .pa-feed { background: var(--bg-card); border: 1px solid var(--line); border-radius: 14px; overflow: hidden; }
    .pa-feed-row { display: flex; align-items: center; gap: 14px; padding: 15px 18px; border-bottom: 1px solid var(--line); }
    .pa-feed-row:last-child { border-bottom: none; }
    .pa-feed-icon {
      width: 38px; height: 38px; border-radius: 10px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      background: color-mix(in oklab, var(--accent) 10%, transparent); color: var(--accent);
    }
    .pa-feed-icon svg { width: 17px; height: 17px; }
    .pa-feed-thumb {
      width: 44px; height: 44px; border-radius: 10px; flex-shrink: 0; overflow: hidden;
      background: var(--bg-alt);
    }
    .pa-feed-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .pa-feed-body { flex: 1; min-width: 0; }
    .pa-feed-body b {
      display: block; font-size: 13.5px; font-weight: 500;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .pa-feed-body span { display: block; font-size: 11.5px; color: var(--ink-3); margin-top: 1px; }
    .pa-feed-tag {
      font-family: 'Archivo', sans-serif; font-size: 9.5px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;
      color: var(--ink-3); background: var(--bg-alt); border: 1px solid var(--line); padding: 3px 9px; border-radius: 100px; white-space: nowrap;
    }
    .pa-feed-tag.accent { color: var(--accent); background: color-mix(in oklab, var(--accent) 10%, transparent); border-color: color-mix(in oklab, var(--accent) 28%, transparent); }
    .pa-empty { padding: 40px 18px; text-align: center; color: var(--ink-3); font-size: 13.5px; grid-column: 1 / -1; }

    /* Article bento cards — same visual language as the public articles.html grid */
    .pa-article-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
    .pa-article-card {
      background: var(--bg-card); border: 1.5px solid var(--line-2); border-radius: 20px; overflow: hidden;
      display: flex; flex-direction: column; text-decoration: none; color: inherit;
      transition: transform 0.25s cubic-bezier(0.22,1,0.36,1), box-shadow 0.25s, border-color 0.2s;
    }
    .pa-article-card:hover {
      transform: translateY(-4px); border-color: var(--accent);
      box-shadow: 0 14px 40px -14px color-mix(in oklab, var(--accent) 18%, rgba(0,0,0,0.08));
    }
    .pa-article-img { width: 100%; height: 190px; overflow: hidden; flex-shrink: 0; }
    .pa-article-img img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.4s ease; }
    .pa-article-card:hover .pa-article-img img { transform: scale(1.04); }
    .pa-article-body { padding: 12px 14px 14px; display: flex; flex-direction: column; flex: 1; }
    .pa-article-top-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 6px; }
    .pa-article-cat { font-family: 'Archivo', sans-serif; font-size: 10.5px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--accent); }
    .pa-article-meta { font-family: 'Archivo', sans-serif; font-size: 10.5px; color: var(--ink-3); letter-spacing: 0.03em; white-space: nowrap; }
    .pa-article-title { font-size: 15px; font-weight: 500; letter-spacing: -0.01em; line-height: 1.3; color: var(--ink); flex: 1; }
    .pa-article-author-row { display: flex; align-items: center; gap: 8px; margin-top: 10px; }
    .pa-article-avatar { width: 28px; height: 28px; border-radius: 50%; overflow: hidden; flex-shrink: 0; background: var(--bg-alt); }
    .pa-article-avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .pa-article-author-info { min-width: 0; }
    .pa-article-author-name { display: block; font-size: 12px; font-weight: 500; color: var(--ink-2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .pa-article-author-role { display: block; font-family: 'Archivo', sans-serif; font-size: 10px; color: var(--ink-4); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    @media (max-width: 1000px) { .pa-article-grid { grid-template-columns: 1fr 1fr; } }
    @media (max-width: 600px) { .pa-article-grid { grid-template-columns: 1fr; } }
  </style>
</head>

<body>

<a href="#main-content" class="skip-link">Skip to main content</a>

  <div id="dash-auth-wall">
    <div class="dw-card">
      <div class="dw-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="10" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
      </div>
      <h1>Member area</h1>
      <p>Sign in with your Expertly membership to access your portal — articles, events, peer connect and more.</p>
      <a href="../login.html" class="d1-btn d1-btn-primary" style="width:100%; justify-content:center;">Log in →</a>
    </div>
  </div>

  <div id="dash-app">
    <div class="d1-shell">
      <aside id="dash-sidebar"></aside>

      <main class="d1-main" id="main-content">
        <div class="dash-hero">
          <div>
            <div class="dash-hero-eyebrow">Articles</div>
            <h1 class="dash-hero-title">Publish insights under <span class="accent">your name</span>.</h1>
            <p class="dash-hero-sub">Indexed for client search, unlimited, and always yours.</p>
          </div>
        </div>

        <div class="d1-search">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
          <input type="text" id="pa-search" placeholder="Search articles by title or author…">
        </div>

        <div class="pa-toolbar">
          <div class="pa-tabs">
            <button class="pa-tab active" data-tab="all">All Articles</button>
            <button class="pa-tab" data-tab="mine">My Articles</button>
          </div>
          <a href="write-article.html" class="d1-btn d1-btn-primary">Write article →</a>
        </div>

        <div class="pa-panel active" data-panel="all">
          <div class="pa-article-grid" id="pa-feed-all"></div>
        </div>

        <div class="pa-panel" data-panel="mine">
          <div class="pa-feed" id="pa-feed-mine"></div>
        </div>
      </main>
    </div>
  </div>

  <script>window.DASH_ACTIVE = 'articles';</script>
  <script src="../assets/members.js"></script>
  <script src="../assets/dashboard-data.js"></script>
  <script src="../assets/dashboard-shared.js"></script>
  <script>
    /* Real published articles — same source (assets/members.js) that
       powers the public articles.html page, so the two stay in sync. */
    let paQuery = '';

    function paRenderAll() {
      const articles = window.EXPERTLY_ARTICLES || [];
      const members = window.EXPERTLY_MEMBERS || [];
      const feedAll = document.getElementById('pa-feed-all');
      const getAuthor = id => members.find(m => m.id === id) || { name: 'Expertly Counsel', initials: 'EC', img: '', title: 'Advisor', firm: '' };
      const q = paQuery.trim().toLowerCase();

      const pool = q
        ? articles.filter(a => a.title.toLowerCase().includes(q) || getAuthor(a.author).name.toLowerCase().includes(q))
        : articles;

      if (!pool.length) {
        feedAll.innerHTML = `<div class="pa-empty">No articles match "${paQuery}".</div>`;
        return;
      }

      feedAll.innerHTML = pool.map(a => {
        const au = getAuthor(a.author);
        const country = au.location ? au.location.split(', ').slice(-1)[0] : '';
        const designation = [au.title, au.firm].filter(Boolean).join(', ');
        const avatar = au.img
          ? `<div class="pa-article-avatar"><img src="${au.img}" alt="${au.name}"></div>`
          : `<div class="pa-article-avatar" style="display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--accent);">${au.initials || 'EC'}</div>`;

        return `
        <a href="../article.html?id=${a.id}" class="pa-article-card">
          <div class="pa-article-img"><img src="${a.image}" alt="${a.title}" loading="lazy"></div>
          <div class="pa-article-body">
            <div class="pa-article-top-row">
              <span class="pa-article-cat">${a.category}${country ? `, ${country}` : ''}</span>
              <span class="pa-article-meta">${a.date} · ${a.readTime}</span>
            </div>
            <div class="pa-article-title">${a.title}</div>
            <div class="pa-article-author-row">
              ${avatar}
              <div class="pa-article-author-info">
                <span class="pa-article-author-name">${au.name}</span>
                <span class="pa-article-author-role">${designation}</span>
              </div>
            </div>
          </div>
        </a>`;
      }).join('');
    }

    const PA_STORE_KEY = 'expertly_my_articles';

    function paGetArticles() {
      try {
        const stored = JSON.parse(localStorage.getItem(PA_STORE_KEY));
        if (Array.isArray(stored)) return stored;
      } catch (e) {}
      return [];
    }

    function paRenderMine() {
      const q = paQuery.trim().toLowerCase();
      const list = paGetArticles().filter(a => !q || a.title.toLowerCase().includes(q));
      const feedMine = document.getElementById('pa-feed-mine');
      if (!list.length) {
        feedMine.innerHTML = paQuery
          ? `<div class="pa-empty">No articles match "${paQuery}".</div>`
          : '<div class="pa-empty">You haven\'t written anything yet — click "Write article" to get started.</div>';
        return;
      }
      feedMine.innerHTML = list.map(a => `
        <div class="pa-feed-row">
          <div class="pa-feed-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg></div>
          <div class="pa-feed-body"><b>${a.title}</b><span>You · ${a.meta}</span></div>
          <span class="pa-feed-tag ${a.status === 'live' ? 'accent' : ''}">${a.status === 'live' ? 'Live' : 'Draft'}</span>
        </div>
      `).join('');
    }

    document.getElementById('pa-search').addEventListener('input', (e) => {
      paQuery = e.target.value;
      paRenderAll();
      paRenderMine();
    });

    document.querySelectorAll('.pa-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.pa-tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.pa-panel').forEach(p => p.classList.remove('active'));
        tab.classList.add('active');
        document.querySelector(`.pa-panel[data-panel="${tab.dataset.tab}"]`).classList.add('active');
      });
    });

    paRenderAll();
    paRenderMine();
  </script>
</body>
</html>
